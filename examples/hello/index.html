<!doctype html>
<body>
  <div id="root"></div>
  <script type="module">
    import { createElement } from "../../src/runtime/index.js";
    import { render, useState } from "../../src/dom/index.js";

    function Counter() {
      const [count, setCount] = useState(7);
      const [isToggle, setIsToggle] = useState(false);

      return createElement(
        "div",
        null,
        createElement("div", {
          style: {
            width: "100px",
            height: "100px",
            background: isToggle ? "azure" : "burlywood",
            border: "1px solid brown",
          },
        }),
        createElement("p", null, count),
        createElement(
          "button",
          { onClick: () => setCount(count + 1) },
          "Click Me!",
        ),
        createElement(
          "button",
          { onClick: () => setIsToggle(!isToggle) },
          "Toggle Bg",
        ),
      );
    }

    // render(createElement(Counter, null), root);

    render(
      createElement("div", null, createElement(Counter)),
      document.getElementById("root"),
    );
  </script>
</body>
